name: dot-skill
description: |
  Dot Skill - Interact with Dot. devices through the OpenAPI. 
  Control text/image display, query device status, and manage devices.

  Key capabilities:
  - Display text content on devices
  - Display image content on devices  
  - Get device status and information
  - List all devices
  - Switch to next content
  - List device tasks

instructions: |
  When user wants to interact with Dot. devices:

  1. First obtain API key (ask user or from DOT_API_KEY env var)
  2. Obtain device ID from user
  3. For Text API or Image API writes, ensure the matching content has already been added to the device loop task in Dot. App Content Studio
  4. Use appropriate endpoint for the task:
     - POST /api/authV2/open/device/:deviceId/text - Display text
     - POST /api/authV2/open/device/:deviceId/image - Display image
     - GET /api/authV2/open/device/:deviceId/status - Get status
     - GET /api/authV2/open/devices - List devices
     - POST /api/authV2/open/device/:deviceId/next - Next content
     - GET /api/authV2/open/device/:deviceId/:taskType/list - List tasks

  5. Always include: Authorization: Bearer dot_app_<api_key>
  6. Rate limit: 10 requests/second

  For text API, parameters include: refreshNow, title, message (supports \n and \t), signature, icon (base64 PNG or full http(s) image URL), link, taskKey, styles.title/signature with fontFamily/fontSize/fontWeight, and styles.message with fontFamily/fontSize/fontWeight/lineHeight
  For image API, parameters include: refreshNow, image (base64 PNG or full http(s) image URL), link, border (0/1), ditherType, ditherKernel, taskKey

tools:
- type: http
  name: dot_openapi
  base_url: https://dot.mindreset.tech
  headers:
    Content-Type: application/json
  endpoints:
  - path: /api/authV2/open/devices
    method: GET
    description: List all devices
  - path: /api/authV2/open/device/{deviceId}/status
    method: GET
    description: Get device status
  - path: /api/authV2/open/device/{deviceId}/next
    method: POST
    description: Switch to next content
  - path: /api/authV2/open/device/{deviceId}/text
    method: POST
    description: Display text content
  - path: /api/authV2/open/device/{deviceId}/image
    method: POST
    description: Display image content
  - path: /api/authV2/open/device/{deviceId}/{taskType}/list
    method: GET
    description: List device tasks
